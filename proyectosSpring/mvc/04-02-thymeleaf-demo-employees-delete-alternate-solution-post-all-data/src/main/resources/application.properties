#
# JDBC properties - Base de datos H2 en memoria
#
spring.datasource.url=jdbc:h2:mem:employee_directory
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

#
# JPA / Hibernate
#
# Hibernate crea la tabla 'employee' a partir de la entidad en cada arranque
spring.jpa.hibernate.ddl-auto=create
# Inserta data.sql DESPUES de que Hibernate cree el esquema
spring.jpa.defer-datasource-initialization=true

#
# Consola web de H2 disponible en http://localhost:8080/h2-console
# (JDBC URL: jdbc:h2:mem:employee_directory  |  User: sa  |  sin password)
#
spring.h2.console.enabled=true
