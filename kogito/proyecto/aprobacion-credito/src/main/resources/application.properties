# ===== Aplicacion =====
spring.application.name=aprobacion-credito
server.port=8080

# ===== Persistencia EN MEMORIA =====
# Sin base de datos: las instancias de proceso viven en memoria.
# (No se declara ningun add-on de persistencia JDBC/MongoDB/Infinispan,
#  por lo que Kogito usa el almacenamiento en memoria por defecto.)
kogito.persistence.type=inmemory

# ===== Logging =====
logging.level.root=INFO
logging.level.org.kie.kogito=INFO
logging.level.org.jbpm=INFO
logging.level.org.drools=WARN
logging.level.com.academy.kogito=DEBUG

# Formato de log legible
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%logger{36}] - %msg%n
